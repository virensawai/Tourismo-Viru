<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    /* --- FULL-SCREEN MODAL STYLES --- */
    #infoModal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 50;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #infoModal.modal-active {
        opacity: 1;
        visibility: visible;
    }

    /* Full background image */
    #modalBackgroundImage {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
    }

    /* Dark overlay */
    #modalBackdrop {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        z-index: -1;
    }

    /* Text content */
    #modalContent {
        position: relative;
        z-index: 10;
        text-align: center;
        color: white;
        max-width: 800px;
        margin: 0 auto;
    }

    #modalTitle {
        font-size: 2.5rem;
        font-weight: 800;
        line-height: 1.2;
    }

    #modalDetails {
        margin-top: 1rem;
        font-size: 1.2rem;
        color: rgba(255,255,255,0.9);
    }

    /* Example button */
    .about-read-more {
        padding: 0.5rem 1rem;
        background: #333;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .about-read-more:hover {
        background: #555;
    }
  </style>
</head>
<body>
  <!-- Example section -->
  <section class="about-section" 
      data-title="Bamboo Garden" 
      data-img-src="./Assets/bamboo garden.jpg"
      data-details="The Bamboo Garden in Amravati, India’s first dedicated bamboo park, offers a unique eco-tourism experience with over 65 species of bamboo and a specialized cactus garden featuring 300+ varieties. With scenic walking trails, bamboo bridges, and a peaceful lotus pond, it’s a perfect getaway for nature lovers, families, and photographers alike. Located at Forest Rest House, Wadali, Amravati Camp, this destination beautifully blends nature, learning, and relaxation.">
      
      <div class="about-grid">
        <button class="about-read-more">Read More</button>
      </div>
  </section>

  <!-- Modal -->
  <div id="infoModal">
      <img id="modalBackgroundImage" src="" alt="Full-screen view">
      <div id="modalBackdrop"></div>

      <button id="closeModalBtn" class="absolute top-6 right-6 text-white/70 hover:text-white transition z-20" style="background:none;border:none;cursor:pointer;">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
               <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
      </button>

      <div class="w-full h-full flex items-center justify-center p-6 sm:p-12 overflow-y-auto">
          <div id="modalContent">
              <h2 id="modalTitle"></h2>
              <p id="modalDetails"></p>
          </div>
      </div>
  </div>

  <script>
    const openModalBtns = document.querySelectorAll('.about-read-more');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const infoModal = document.getElementById('infoModal');
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalBackgroundImage = document.getElementById('modalBackgroundImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalDetails = document.getElementById('modalDetails');

    const openModal = (title, imgSrc, details) => {
        modalTitle.textContent = title;
        modalBackgroundImage.src = imgSrc;
        modalDetails.textContent = details;
        
        infoModal.classList.add('modal-active');
        document.body.style.overflow = 'hidden';
    };

    const closeModal = () => {
        infoModal.classList.remove('modal-active');
        document.body.style.overflow = 'auto';
    };

    openModalBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const section = btn.closest('.about-section');
            openModal(section.dataset.title, section.dataset.imgSrc, section.dataset.details);
        });
    });

    closeModalBtn.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && infoModal.classList.contains('modal-active')) {
            closeModal();
        }
    });
  </script>
</body>
</html>
